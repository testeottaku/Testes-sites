<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notificações | MuciGems</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b0f19; --card-bg: rgba(15, 20, 35, 0.88); --purple: #7c3aed; --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: radial-gradient(1200px 600px at 10% 10%, rgba(30, 58, 138, 0.15), transparent), radial-gradient(1000px 500px at 90% 90%, rgba(124, 58, 237, 0.12), transparent), var(--bg-dark); color: var(--text-main); min-height: 100vh; padding-bottom: 40px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--card-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(10px); }
        .back-btn { background: none; border: none; color: var(--text-main); font-size: 1.2rem; cursor: pointer; }
        .page-title { font-size: 1.2rem; font-weight: 700; flex: 1; text-align: center; }
        
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
        
        /* Notification Card */
        .notif-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            padding: 18px; 
            margin-bottom: 14px; 
            position: relative; 
            transition: 0.2s; 
            animation: fadeIn 0.4s ease;
        }
        .notif-card.unread { border-left: 4px solid var(--purple); background: rgba(124, 58, 237, 0.05); }
        .notif-card.read { opacity: 0.7; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .notif-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .notif-tag { font-size: 0.75rem; font-weight: 700; color: var(--purple); text-transform: uppercase; background: rgba(124, 58, 237, 0.15); padding: 4px 8px; border-radius: 6px; }
        .notif-time { font-size: 0.8rem; color: var(--text-muted); }
        
        .notif-message { font-size: 0.95rem; color: var(--text-main); line-height: 1.5; white-space: pre-wrap; }
        
        .notif-footer { margin-top: 12px; display: flex; justify-content: flex-end; }
        .btn-mark-read { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
        .btn-mark-read:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
    </style>
</head>
<body>
    <div class="top-bar">        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
        <div class="page-title">Notificações</div>
        <div style="width: 24px;"></div>
    </div>

    <div class="container" id="notifList">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Carregando...</p></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getDatabase, ref, onValue, remove, update } from "./firebase-firestore-compat.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZVYZGG5lcFlqH2jS1qqOWmw8cj83jezQ",
            authDomain: "renda-cash-f3c91-default-rtdb.firebaseio.com",
            databaseURL: "https://renda-cash-f3c91-default-rtdb.firebaseio.com",
            projectId: "renda-cash-f3c91",            storageBucket: "renda-cash-f3c91.firebasestorage.app",
            messagingSenderId: "600925903090",
            appId: "1:346807213810:android:b05ec1bcab93f9bf747a6b",
            measurementId: "G-BT9FB5CTNM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- Lógica de Limpeza (24 Horas) ---
        function cleanOldNotifications(uid) {
            const userNotifsRef = ref(db, `Notificacoes/${uid}`);
            onValue(userNotifsRef, (snapshot) => {
                if (!snapshot.exists()) return;
                
                const oneDayInMs = 24 * 60 * 60 * 1000;
                const now = Date.now();

                snapshot.forEach((child) => {
                    const notif = child.val();
                    const notifTime = notif.data;
                    
                    // Se a notificação for mais velha que 24h, remove do banco
                    if (notifTime && (now - notifTime > oneDayInMs)) {
                        remove(child.ref);
                    }
                });
            });
        }
        // --- Carregar Notificações ---
        function loadNotifications(uid) {
            const notifList = document.getElementById('notifList');
            const userNotifsRef = ref(db, `Notificacoes/${uid}`);
            
            onValue(userNotifsRef, (snapshot) => {
                notifList.innerHTML = '';
                
                if (!snapshot.exists()) {
                    notifList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-bell-slash"></i>
                            <p>Nenhuma notificação no momento.</p>
                        </div>`;
                    return;
                }

                let notifs = [];
                snapshot.forEach(child => {
                    notifs.push({ id: child.key, ...child.val() });
                });

                // Ordenar por data (mais recente primeiro)
                notifs.sort((a, b) => b.data - a.data);

                if (notifs.length === 0) {
                    notifList.innerHTML = `<div class="empty-state"><p>Nenhuma notificação.</p></div>`;
                    return;
                }

                notifs.forEach(notif => {
                    const isRead = notif.lido === true;
                    const date = new Date(notif.data).toLocaleString('pt-BR');
                    
                    const card = document.createElement('div');
                    card.className = `notif-card ${isRead ? 'read' : 'unread'}`;
                    card.innerHTML = `
                        <div class="notif-header">
                            <span class="notif-tag"><i class="fas fa-headset"></i> ${notif.tipo || 'Suporte'}</span>
                            <span class="notif-time">${date}</span>
                        </div>
                        <div class="notif-message">${notif.mensagem || 'Sem mensagem'}</div>
                        ${!isRead ? `
                        <div class="notif-footer">
                            <button class="btn-mark-read" onclick="markAsRead('${notif.id}', '${uid}')">Marcar como lida</button>
                        </div>` : ''}
                    `;
                    notifList.appendChild(card);
                });
            });        }

        // Marcar como lida
        window.markAsRead = (notifId, uid) => {
            update(ref(db, `Notificacoes/${uid}/${notifId}`), { lido: true });
        };

        // Init
        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            
            // Inicia limpeza automática
            cleanOldNotifications(user.uid);
            
            // Carrega lista
            loadNotifications(user.uid);
        });
    </script>
</body>
</html>
