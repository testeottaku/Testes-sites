<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atualizações | MuciGems</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0f19; --card-bg: rgba(15, 20, 35, 0.88); --navy: #1e3a8a; --purple: #7c3aed;
            --red: #dc2626; --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(1200px 600px at 10% 10%, rgba(30, 58, 138, 0.15), transparent), radial-gradient(1000px 500px at 90% 90%, rgba(124, 58, 237, 0.12), transparent), var(--bg-dark); color: var(--text-main); min-height: 100vh; padding-bottom: 40px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--card-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(10px); }
        .menu-btn { background: none; border: none; color: var(--text-main); font-size: 1.3rem; cursor: pointer; }
        .logo { font-weight: 800; font-size: 1.3rem; background: linear-gradient(135deg, var(--navy), var(--purple)); -webkit-background-clip: text; color: transparent; }
        
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; opacity: 0; visibility: hidden; transition: 0.3s; }
        .drawer-overlay.open { opacity: 1; visibility: visible; }
        .drawer { position: fixed; top: 0; left: 0; width: 280px; height: 100vh; background: var(--card-bg); border-right: 1px solid var(--border); z-index: 100; transform: translateX(-100%); transition: 0.3s ease; display: flex; flex-direction: column; }
        .drawer.open { transform: translateX(0); }
        .drawer-header { padding: 24px; border-bottom: 1px solid var(--border); text-align: center; }
        .drawer-header i { font-size: 2rem; color: var(--purple); margin-bottom: 8px; }
        .drawer-header h2 { font-size: 1.4rem; font-weight: 800; color: var(--text-main); }
        .drawer-links { flex: 1; padding: 16px; overflow-y: auto; }
        .drawer-link { display: flex; align-items: center; gap: 12px; padding: 14px 16px; color: var(--text-muted); text-decoration: none; font-weight: 500; border-radius: 10px; margin-bottom: 4px; transition: 0.2s; }
        .drawer-link:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .drawer-link i { width: 20px; text-align: center; }
        .drawer-footer { padding: 20px; border-top: 1px solid var(--border); }
        .logout-btn { display: flex; align-items: center; gap: 10px; color: var(--red); text-decoration: none; font-weight: 600; }

        .container { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
        .page-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        
        .updates-container { display: flex; flex-direction: column; gap: 16px; }
        .update-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 20px; backdrop-filter: blur(12px); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .update-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .update-date { font-size: 0.8rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; }
        .update-title { font-size: 1.1rem; font-weight: 700; color: var(--purple); }
        
        .update-list { list-style: none; padding-left: 0; margin: 0; }
        .update-list li { padding: 8px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); color: var(--text-muted); line-height: 1.5; font-size: 0.95rem; }
        .update-list li:last-child { border-bottom: none; }
        .update-list li strong { color: var(--text-main); margin-right: 6px; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }        .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }

        footer { margin-top: 32px; text-align: center; color: var(--text-muted); font-size: 0.82rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        <div class="logo">MuciGems</div>
        <div style="width: 24px;"></div>
    </div>
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
        <div class="drawer-header"><i class="fas fa-gem"></i><h2>MuciGems</h2></div>
        <nav class="drawer-links">
            <a href="home.html" class="drawer-link"><i class="fas fa-store"></i> Loja</a>
            <a href="perfil.html" class="drawer-link"><i class="fas fa-user"></i> Perfil</a>
            <a href="atualizacoes.html" class="drawer-link" style="color:var(--purple);background:rgba(124,58,237,0.1);"><i class="fas fa-rotate"></i> Atualizações</a>
            <a href="sobre.html" class="drawer-link"><i class="fas fa-info-circle"></i> Sobre Nós</a>
            <a href="suporte.html" class="drawer-link"><i class="fas fa-headset"></i> Suporte</a>
            <a href="politica.html" class="drawer-link"><i class="fas fa-shield-halved"></i> Privacidade</a>
            <a href="termos.html" class="drawer-link"><i class="fas fa-file-contract"></i> Termos</a>
        </nav>
        <div class="drawer-footer"><a href="login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</a></div>
    </aside>

    <main class="container">
        <h1 class="page-title"><i class="fas fa-rotate" style="color: var(--purple);"></i> Registro de Atualizações</h1>
        <div class="updates-container" id="updatesContainer">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Carregando atualizações...</p>
            </div>
        </div>
    </main>
    <footer>MuciGems © 2026</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "./firebase-firestore-compat.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZVYZGG5lcFlqH2jS1qqOWmw8cj83jezQ",
            authDomain: "renda-cash-f3c91-default-rtdb.firebaseio.com",
            databaseURL: "https://renda-cash-f3c91-default-rtdb.firebaseio.com",
            projectId: "renda-cash-f3c91",            storageBucket: "renda-cash-f3c91.firebasestorage.app",
            messagingSenderId: "600925903090",
            appId: "1:346807213810:android:b05ec1bcab93f9bf747a6b",
            measurementId: "G-BT9FB5CTNM"        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const menuBtn = document.getElementById('menuBtn');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('drawerOverlay');
        function toggleDrawer() { drawer.classList.toggle('open'); overlay.classList.toggle('open'); }
        menuBtn.addEventListener('click', toggleDrawer);
        overlay.addEventListener('click', toggleDrawer);

        // --- CARREGAR ATUALIZAÇÕES EM TEMPO REAL ---
        const updatesRef = ref(db, 'Atualizacoes');
        onValue(updatesRef, (snapshot) => {
            const container = document.getElementById('updatesContainer');
            if (!snapshot.exists()) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>Nenhuma atualização publicada ainda.</p></div>`;
                return;
            }

            const updates = [];
            snapshot.forEach(child => updates.push(child.val()));
            // Ordenar por data mais recente
            updates.sort((a, b) => new Date(b.data) - new Date(a.data));

            container.innerHTML = updates.map(u => {
                const date = new Date(u.data).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
                // Converte quebras de linha em lista HTML numerada
                const items = u.descricao.split('\n').map(line => {
                    const match = line.match(/^(\d+)\.\s*(.*)/);
                    return match ? `<li><strong>${match[1]}.</strong> ${match[2]}</li>` : `<li>${line}</li>`;
                }).join('');

                return `
                    <div class="update-card">
                        <div class="update-header">
                            <span class="update-title">${u.titulo}</span>
                            <span class="update-date"><i class="fas fa-calendar-alt" style="margin-right:6px;"></i>${date}</span>
                        </div>
                        <ul class="update-list">${items}</ul>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
