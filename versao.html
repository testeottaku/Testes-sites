<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Versão | MuciGems</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0f19; --card-bg: rgba(15, 20, 35, 0.88); --navy: #1e3a8a; --purple: #7c3aed;
            --red: #dc2626; --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(1200px 600px at 10% 10%, rgba(30, 58, 138, 0.15), transparent), radial-gradient(1000px 500px at 90% 90%, rgba(124, 58, 237, 0.12), transparent), var(--bg-dark); color: var(--text-main); min-height: 100vh; padding-bottom: 40px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--card-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(10px); }
        .menu-btn { background: none; border: none; color: var(--text-main); font-size: 1.3rem; cursor: pointer; }
        .logo { font-weight: 800; font-size: 1.3rem; background: linear-gradient(135deg, var(--navy), var(--purple)); -webkit-background-clip: text; color: transparent; }
        
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; opacity: 0; visibility: hidden; transition: 0.3s; }
        .drawer-overlay.open { opacity: 1; visibility: visible; }
        .drawer { position: fixed; top: 0; left: 0; width: 280px; height: 100vh; background: var(--card-bg); border-right: 1px solid var(--border); z-index: 100; transform: translateX(-100%); transition: 0.3s ease; display: flex; flex-direction: column; }
        .drawer.open { transform: translateX(0); }
        .drawer-header { padding: 24px; border-bottom: 1px solid var(--border); text-align: center; }
        .drawer-header i { font-size: 2rem; color: var(--purple); margin-bottom: 8px; }
        .drawer-header h2 { font-size: 1.4rem; font-weight: 800; color: var(--text-main); }
        .drawer-links { flex: 1; padding: 16px; overflow-y: auto; }
        .drawer-link { display: flex; align-items: center; gap: 12px; padding: 14px 16px; color: var(--text-muted); text-decoration: none; font-weight: 500; border-radius: 10px; margin-bottom: 4px; transition: 0.2s; }
        .drawer-link:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .drawer-link i { width: 20px; text-align: center; }
        .drawer-footer { padding: 20px; border-top: 1px solid var(--border); }
        .logout-btn { display: flex; align-items: center; gap: 10px; color: var(--red); text-decoration: none; font-weight: 600; }

        .container { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
        .page-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        
        .version-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 32px 24px; text-align: center; backdrop-filter: blur(12px); margin-bottom: 20px; }
        .version-number { font-size: 3rem; font-weight: 800; color: var(--purple); margin-bottom: 12px; letter-spacing: -1px; }
        .stability-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-bottom: 24px; }
        .stability-badge.estavel { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .stability-badge.teste { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .info-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: left; }
        .info-item .label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
        .info-item .value { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
        
        .status-indicator { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }        .status-dot.operacional { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-dot.beta { background: var(--purple); box-shadow: 0 0 8px var(--purple); }
        
        .stack-section { margin-top: 24px; text-align: left; }
        .stack-section h3 { font-size: 1rem; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; }
        .stack-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .stack-tag { background: var(--purple); color: white; padding: 8px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 500; }
        
        .footer-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; margin-top: 24px; }
        .footer-card p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }
        .footer-card .heart { color: var(--red); }

        .loading-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .loading-state i { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.5; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { margin-top: 24px; text-align: center; color: var(--text-muted); font-size: 0.82rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        <div class="logo">MuciGems</div>
        <div style="width: 24px;"></div>
    </div>
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
        <div class="drawer-header"><i class="fas fa-gem"></i><h2>MuciGems</h2></div>
        <nav class="drawer-links">
            <a href="home.html" class="drawer-link"><i class="fas fa-store"></i> Loja</a>
            <a href="perfil.html" class="drawer-link"><i class="fas fa-user"></i> Perfil</a>
            <a href="atualizacoes.html" class="drawer-link"><i class="fas fa-rotate"></i> Atualizações</a>
            <a href="versao.html" class="drawer-link" style="color:var(--purple);background:rgba(124,58,237,0.1);"><i class="fas fa-code-branch"></i> Versão</a>
            <a href="sobre.html" class="drawer-link"><i class="fas fa-info-circle"></i> Sobre Nós</a>
            <a href="suporte.html" class="drawer-link"><i class="fas fa-headset"></i> Suporte</a>
            <a href="politica.html" class="drawer-link"><i class="fas fa-shield-halved"></i> Privacidade</a>
            <a href="termos.html" class="drawer-link"><i class="fas fa-file-contract"></i> Termos</a>
        </nav>
        <div class="drawer-footer"><a href="login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</a></div>
    </aside>

    <main class="container">
        <h1 class="page-title"><i class="fas fa-code-branch" style="color: var(--purple);"></i> Informações da Versão</h1>
        
        <div id="versionContainer">
            <div class="loading-state">
                <i class="fas fa-circle-notch"></i>
                <p>Carregando informações...</p>
            </div>
        </div>
        <div class="footer-card">
            <p>MuciGems © <span id="currentYear">2026</span> | Todos os direitos reservados.<br>Desenvolvido com <span class="heart">❤️</span> para a comunidade Free Fire.</p>
        </div>
    </main>
    <footer>MuciGems © 2026</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "./firebase-firestore-compat.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZVYZGG5lcFlqH2jS1qqOWmw8cj83jezQ",
            authDomain: "renda-cash-f3c91-default-rtdb.firebaseio.com",
            databaseURL: "https://renda-cash-f3c91-default-rtdb.firebaseio.com",
            projectId: "renda-cash-f3c91",            storageBucket: "renda-cash-f3c91.firebasestorage.app",
            messagingSenderId: "600925903090",
            appId: "1:346807213810:android:b05ec1bcab93f9bf747a6b",
            measurementId: "G-BT9FB5CTNM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const menuBtn = document.getElementById('menuBtn');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('drawerOverlay');
        function toggleDrawer() { drawer.classList.toggle('open'); overlay.classList.toggle('open'); }
        menuBtn.addEventListener('click', toggleDrawer);
        overlay.addEventListener('click', toggleDrawer);

        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // --- LOAD VERSION DATA FROM FIREBASE ---
        const versionRef = ref(db, 'Versao');
        onValue(versionRef, (snapshot) => {
            const container = document.getElementById('versionContainer');
            
            if (!snapshot.exists()) {
                // Fallback data if nothing saved yet
                renderVersion({
                    versao: '1.0.0',
                    build: '#2026.04.13',
                    ultimaAtualizacao: '2026-04-13',
                    servidor: 'BR-SUDESTE-04',
                    estabilidade: 'Estável',
                    status: 'Operacional'
                });
                return;            }

            renderVersion(snapshot.val());
        }, (error) => {
            console.error('Error loading version:', error);
            document.getElementById('versionContainer').innerHTML = `
                <div class="loading-state">
                    <i class="fas fa-exclamation-triangle" style="color: var(--red); animation: none;"></i>
                    <p>Erro ao carregar dados. Tente novamente.</p>
                </div>
            `;
        });

        function renderVersion(data) {
            const container = document.getElementById('versionContainer');
            
            // Format date
            let dateFormatted = data.ultimaAtualizacao || 'N/A';
            if (dateFormatted !== 'N/A') {
                const d = new Date(dateFormatted + 'T00:00:00');
                dateFormatted = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
            }

            // Status classes
            const statusClass = data.status === 'Operacional' ? 'operacional' : 'beta';
            const stabilityClass = data.estabilidade === 'Estável' ? 'estavel' : 'teste';
            const stabilityIcon = data.estabilidade === 'Estável' ? 'fa-check-circle' : 'fa-flask';

            container.innerHTML = `
                <div class="version-card">
                    <div class="version-number">v${data.versao || '1.0.0'}</div>
                    <div class="stability-badge ${stabilityClass}">
                        <i class="fas ${stabilityIcon}"></i> ${data.estabilidade || 'Estável'}
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">Build</div>
                            <div class="value">${data.build || '#'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Última Atualização</div>
                            <div class="value">${dateFormatted}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Servidor</div>
                            <div class="value">${data.servidor || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Status</div>                            <div class="value">
                                <div class="status-indicator">
                                    <div class="status-dot ${statusClass}"></div>
                                    ${data.status || 'Operacional'}
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="stack-section">
                        <h3>Stack Tecnológica</h3>
                        <div class="stack-tags">
                            <span class="stack-tag">HTML5</span>
                            <span class="stack-tag">CSS3 / Glassmorphism</span>
                            <span class="stack-tag">JavaScript ES6+</span>
                            <span class="stack-tag">Firebase SDK 10</span>
                            <span class="stack-tag">Font Awesome 6</span>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
