<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | MuciGems</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0b0f19; --card-bg: rgba(15, 20, 35, 0.88); --navy: #1e3a8a; --purple: #7c3aed; --red: #dc2626; --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(255, 255, 255, 0.08); --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: radial-gradient(1200px 600px at 10% 10%, rgba(30, 58, 138, 0.15), transparent), radial-gradient(1000px 500px at 90% 90%, rgba(124, 58, 237, 0.12), transparent), var(--bg-dark); color: var(--text-main); min-height: 100vh; padding-bottom: 40px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--card-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(10px); }
        .menu-btn { background: none; border: none; color: var(--text-main); font-size: 1.3rem; cursor: pointer; }
        .logo { font-weight: 800; font-size: 1.3rem; background: linear-gradient(135deg, var(--navy), var(--purple)); -webkit-background-clip: text; color: transparent; }
        
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; opacity: 0; visibility: hidden; transition: 0.3s; }
        .drawer-overlay.open { opacity: 1; visibility: visible; }
        .drawer { position: fixed; top: 0; left: 0; width: 280px; height: 100vh; background: var(--card-bg); border-right: 1px solid var(--border); z-index: 100; transform: translateX(-100%); transition: 0.3s ease; display: flex; flex-direction: column; }
        .drawer.open { transform: translateX(0); }
        .drawer-header { padding: 24px; border-bottom: 1px solid var(--border); text-align: center; }
        .drawer-header i { font-size: 2rem; color: var(--purple); margin-bottom: 8px; }
        .drawer-header h2 { font-size: 1.4rem; font-weight: 800; color: var(--text-main); }
        .drawer-links { flex: 1; padding: 16px; }
        .drawer-link { display: flex; align-items: center; gap: 12px; padding: 14px 16px; color: var(--text-muted); text-decoration: none; font-weight: 500; border-radius: 10px; margin-bottom: 4px; transition: 0.2s; }
        .drawer-link:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .drawer-link i { width: 20px; text-align: center; }
        .drawer-footer { padding: 20px; border-top: 1px solid var(--border); }
        .logout-btn { display: flex; align-items: center; gap: 10px; color: var(--red); text-decoration: none; font-weight: 600; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 24px 20px; }
        .page-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 24px; }
        
        /* Card de Saldo */
        .balance-card { background: linear-gradient(135deg, var(--navy), var(--purple)); border: none; text-align: center; padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(124, 58, 237, 0.2); }
        .balance-label { font-size: 0.9rem; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
        .balance-value { font-size: 2.8rem; font-weight: 800; color: white; }
        
        .info-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 20px; backdrop-filter: blur(12px); margin-bottom: 12px; }
        .info-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { font-size: 1.1rem; color: var(--text-main); font-weight: 600; word-break: break-all; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: none; border: none; color: var(--purple); cursor: pointer; font-size: 1rem; padding: 5px; transition: 0.2s; }
        .copy-btn:hover { color: white; transform: scale(1.1); }
        
        .btn-copy-uid { margin-top: 10px; width: 100%; padding: 12px; background: rgba(255,255,255,0.1); color: var(--text-main); border: 1px solid var(--border); border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-copy-uid:hover { background: rgba(255,255,255,0.2); border-color: var(--purple); }

        /* Toast Notification */
        #toast { visibility: hidden; min-width: 250px; background-color: var(--success); color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 0.95rem; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
        <div class="logo">MuciGems</div>
        <div style="width: 24px;"></div>
    </div>
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
        <div class="drawer-header"><i class="fas fa-gem"></i><h2>MuciGems</h2></div>
        <nav class="drawer-links">
            <a href="home.html" class="drawer-link"><i class="fas fa-store"></i> Loja</a>
            <a href="perfil.html" class="drawer-link" style="color:var(--purple);background:rgba(124,58,237,0.1);"><i class="fas fa-user"></i> Perfil</a>
            <a href="sobre.html" class="drawer-link"><i class="fas fa-info-circle"></i> Sobre Nós</a>
            <a href="politica.html" class="drawer-link"><i class="fas fa-shield-halved"></i> Privacidade</a>
            <a href="termos.html" class="drawer-link"><i class="fas fa-file-contract"></i> Termos</a>
        </nav>
        <div class="drawer-footer"><a href="login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</a></div>
    </aside>

    <main class="container">
        <h1 class="page-title">Meu Perfil</h1>
        
        <!-- Card de Saldo -->
        <div class="card balance-card">
            <div class="balance-label">Seu Saldo Atual</div>
            <div class="balance-value" id="displayBalance">R$ 0,00</div>
        </div>

        <!-- Informações do Usuário -->
        <div class="info-card">
            <div class="info-label">E-mail Cadastrado</div>
            <div class="info-value">
                <span id="displayEmail">...</span>
            </div>
        </div>

        <div class="info-card">
            <div class="info-label">Seu UID Free Fire</div>
            <div class="info-value">
                <span id="displayUID">...</span>
                <button class="copy-btn" onclick="copyToClipboard('displayUID')"><i class="far fa-copy"></i></button>
            </div>
        </div>
    </main>

    <!-- Toast para Feedback -->    <div id="toast">Copiado com sucesso!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "./firebase-firestore-compat.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZVYZGG5lcFlqH2jS1qqOWmw8cj83jezQ",
            authDomain: "renda-cash-f3c91-default-rtdb.firebaseio.com",
            databaseURL: "https://renda-cash-f3c91-default-rtdb.firebaseio.com",
            projectId: "renda-cash-f3c91",            storageBucket: "renda-cash-f3c91.firebasestorage.app",
            messagingSenderId: "600925903090",
            appId: "1:346807213810:android:b05ec1bcab93f9bf747a6b",
            measurementId: "G-BT9FB5CTNM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Drawer Menu
        const menuBtn = document.getElementById('menuBtn');
        const drawer = document.getElementById('drawer');
        const drawerOverlay = document.getElementById('drawerOverlay');
        function toggleDrawer() { drawer.classList.toggle('open'); drawerOverlay.classList.toggle('open'); }
        menuBtn.addEventListener('click', toggleDrawer);
        drawerOverlay.addEventListener('click', toggleDrawer);

        // Toast Function
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // Função de Copiar
        window.copyToClipboard = (elementId) => {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copiado para a área de transferência!');
            });
        };

        // Carregar Dados do Usuário
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userRef = ref(db, 'Usuarios/' + user.uid);                
                // Exibir Email direto do Auth
                document.getElementById('displayEmail').textContent = user.email;

                onValue(userRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        // Exibir Saldo
                        const saldo = parseFloat(data.balance || 0);
                        document.getElementById('displayBalance').textContent = `R$ ${saldo.toFixed(2).replace('.', ',')}`;
                        
                        // Exibir UID
                        document.getElementById('displayUID').textContent = data.uidFF || 'Não definido';
                    }
                });
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
